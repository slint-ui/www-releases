
name: Deploy to releases.slint.dev

on:
  workflow_call:
    inputs:
      new_release:
        description: "Is this a new release? True means Cloudflare redirects will be updated and Docs will be scraped"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      new_release:
        description: "Is this a new release? True means Cloudflare redirects will be updated and Docs will be scraped"
        required: true
        default: false
        type: boolean

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./releases
    outputs:
      version: ${{ steps.identify-version.outputs.VERSION }}
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            releases

      - name: Identify Version
        id: identify-version
        run: |
          version=$(sed -n '1p' versions.txt)
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: npm install
        run: |
          npm install

      - name: Generate a token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.READ_WRITE_APP_ID }}
          private-key: ${{ secrets.READ_WRITE_PRIVATE_KEY }}
          repositories: |
            website
            docs-site
  
      - name: Clone website directory
        uses: actions/checkout@v4
        with:
          repository: slint-ui/website
          ref: prod
          path: releases/website
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate docs.html and 404.html
        run: |
          mkdir -p website/output
          cd website && go run generator/generator.go -skip-agreements

      - name: Copy docs.html and 404.html
        run: |
          cp website/output/docs.html index.html
          cp website/output/404.html 404.html
          rm -rf website

      - name: Install Netlify
        run: |
          npm install netlify-cli --save-dev
    
      - name: Deploy to Netlify
        id: netlify_deploy
        run: |
          npx netlify deploy \
            --dir . \
            --site ${{ secrets.NETLIFY_RELEASES_SITE_ID }} \
            --auth ${{ secrets.NETLIFY_API_TOKEN }} \
            --prod

      # docs.slint.dev is now built and deployed from the slint-ui/docs-site repo
      # (it checks this repo out for the release sources). A release here must
      # rebuild docs.slint.dev, so trigger its production deploy. Requires the
      # GitHub App (READ_WRITE_APP_ID) to be installed on docs-site with
      # Actions: write — see the repositories list in the token step above.
      - name: Trigger docs.slint.dev deploy (docs-site)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run deploy.yml -R slint-ui/docs-site -f production=true

